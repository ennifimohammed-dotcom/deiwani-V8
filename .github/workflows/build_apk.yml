name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Download Tajawal fonts
        run: |
          mkdir -p assets/fonts
          curl -fsSL "https://github.com/google/fonts/raw/refs/heads/main/ofl/tajawal/Tajawal-Regular.ttf" \
            -o assets/fonts/Tajawal-Regular.ttf || true
          curl -fsSL "https://github.com/google/fonts/raw/refs/heads/main/ofl/tajawal/Tajawal-Bold.ttf" \
            -o assets/fonts/Tajawal-Bold.ttf || true
          curl -fsSL "https://github.com/google/fonts/raw/refs/heads/main/ofl/tajawal/Tajawal-ExtraBold.ttf" \
            -o assets/fonts/Tajawal-ExtraBold.ttf || true
          [ -f assets/fonts/Tajawal-Regular.ttf ] || \
            cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf \
            assets/fonts/Tajawal-Regular.ttf 2>/dev/null || true
          [ -f assets/fonts/Tajawal-Bold.ttf ] || \
            cp assets/fonts/Tajawal-Regular.ttf \
            assets/fonts/Tajawal-Bold.ttf
          [ -f assets/fonts/Tajawal-ExtraBold.ttf ] || \
            cp assets/fonts/Tajawal-Regular.ttf \
            assets/fonts/Tajawal-ExtraBold.ttf

      - run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: Deiwani-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
